# auto-merge.yml — methodology kit (MP-018/044)
# RU: авто-мерж PR с меткой `auto-merge` ТОЛЬКО когда зелёные проверки (tsc/lint/build).
# EN: auto-merge PRs labeled `auto-merge` once required checks pass. Never merges red.
# Требует: ветка защищена required status checks; метка `auto-merge` на PR.
name: auto-merge

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm run lint --if-present
      - run: npm run build --if-present

  merge:
    needs: gate
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'auto-merge')
    steps:
      - name: Enable auto-merge (squash) when checks green
        run: gh pr merge --squash --auto "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
